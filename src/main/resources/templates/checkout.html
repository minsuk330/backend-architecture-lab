<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NICEPAY PAY REQUEST(UTF-8)</title>
  <style>
    html, body {
      height: 100%;
    }

    form {
      overflow: hidden;
    }

    table {
      display: none;
    }
  </style>
  <script src="https://pg-web.nicepay.co.kr/v3/common/js/nicepay-pgweb.js" type="text/javascript"></script>
  <script type="text/javascript">
    function nicepayStart() {
      goPay(document.payForm);
    }

    function nicepaySubmit() {
      document.payForm.submit();
    }

    function nicepayClose() {
      // redirect to
      let url = "https://kmorgan.co.kr/my-page/items?success=false&message=결제가 취소되었습니다";
      window.location.href = url;
    }

    window.onload = function () {
      nicepayStart();
    };
  </script>
</head>

<body>
<form name="payForm" method="post" accept-charset="EUC-KR" th:action="${data.actionUrl}">
  <table>
    <tr>
      <th>PayMethod</th>
      <td><input type="text" name="PayMethod" value="CARD"></td>
    </tr>
    <tr>
      <th>GoodsName</th>
      <td><input type="text" name="GoodsName" th:value="${data.goodsName}"></td>
    </tr>
    <tr>
      <th>Amt</th>
      <td><input type="text" name="Amt" th:value="${data.amt}"></td>
    </tr>
    <tr>
      <th>MID</th>
      <td><input type="text" name="MID" th:value="${data.mid}"></td>
    </tr>
    <tr>
      <th>Moid</th>
      <td><input type="text" name="Moid" th:value="${data.moid}"></td>
    </tr>
    <tr>
      <th>BuyerName</th>
      <td><input type="text" name="BuyerName" th:value="${data.buyerName}"></td>
    </tr>
    <tr>
      <th>BuyerEmail</th>
      <td><input type="text" name="BuyerEmail" th:value="${data.buyerEmail}"></td>
    </tr>
    <tr>
      <th>ReturnURL [Mobile only]</th>
      <td><input type="text" name="ReturnURL" th:value="${data.returnUrl}"></td>
    </tr>
    <tr>
      <th>Mobile Marker</th>
      <td><input type="text" name="MobileYN" value="N"></td>
    </tr>

    <tr>
      <th>Virtual Account Expiration Date(YYYYMMDD)</th>
      <td><input type="text" name="VbankExpDate" value=""></td>
    </tr>
    <input type="hidden" name="NpLang" value="KO" /> <!-- EN:English, CN:Chinese, KO:Korean -->
    <input type="hidden" name="GoodsCl" value="1" /> <!-- products(1), contents(0) -->
    <input type="hidden" name="TransType" value="0" /> <!-- USE escrow false(0)/true(1) -->
    <input type="hidden" name="CharSet" value="utf-8" /> <!-- Return CharSet -->
    <input type="hidden" name="ReqReserved" th:value="${data.getReqReserved()}" /> <!-- mall custom field -->

    <input type="hidden" name="EdiDate" th:value="${data.ediDate}" /> <!-- YYYYMMDDHHMISS -->
    <input type="hidden" name="SignData" th:value="${data.signData}" /> <!-- EncryptData -->

    <input type="hidden" name="DirectShowOpt" th:value="${data.directShowOpt}" /> <!-- EncryptData -->
    <input type="hidden" name="DirectEasyPay" th:value="${data.directEasyPay}" /> <!-- EncryptData -->
    <input type="hidden" name="EasyPayMethod" th:value="${data.easyPayMethod}" /> <!-- EncryptData -->
    <input type="hidden" name="NicepayReserved" th:value="${data.nicepayReserved}" /> <!-- EncryptData -->

  </table>
</form>
</body>

</html>
