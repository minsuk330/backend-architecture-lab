spring:
  config:
    import:
      - optional:file:env/db.env[.properties]

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MariaDBDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        default_batch_fetch_size: 1000
        globally_quoted_identifiers: true
      jdbc:
        batch_size: 1000
        batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false

---
spring:
  config:
    activate:
      on-profile: develop

  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
      default_batch_fetch_size: 1000

    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE  # Hibernate 6.x용 추가
---
spring:
  config:
    activate:
      on-profile: db-create
  jpa:
    hibernate:
      ddl-auto: create
---
spring:
  config:
    activate:
      on-profile: debug
  jpa:
#    hibernate:
#      ddl-auto: create-drop
    show-sql: false
    properties:
        hibernate:
          default_batch_fetch_size: 100
        jdbc:
          batch_size: 1000
        format_sql: false
